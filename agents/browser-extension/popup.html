<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 280px; font-family: system-ui, sans-serif; background: #0a0e1a; color: #e5e7eb; margin: 0; padding: 14px; }
      h1 { font-size: 14px; color: #38bdf8; margin: 0 0 10px; }
      button { width: 100%; padding: 9px; border: 0; border-radius: 8px; background: #38bdf8; color: #0a0e1a; font-weight: 600; cursor: pointer; }
      button:disabled { opacity: .5; }
      input { width: 100%; box-sizing: border-box; margin-top: 8px; padding: 6px; border-radius: 6px; border: 1px solid #334155; background: #111827; color: #e5e7eb; }
      .status { margin-top: 10px; font-size: 12px; color: #94a3b8; min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>Ultron Capture</h1>
    <button id="capture">Capture this page → Skills</button>
    <input id="backend" placeholder="http://localhost:8080" />
    <input id="ultronKey" placeholder="X-Ultron-Key (optional)" />
    <div class="status" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
