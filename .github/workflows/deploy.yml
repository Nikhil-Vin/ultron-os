name: Deploy

# Manual + tagged releases only — never auto-deploys on every push.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  frontend-netlify:
    name: Frontend → Netlify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci || npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: frontend/dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  backend-fly:
    name: Backend → Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config backend/fly.toml
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  ai-layer-railway:
    name: AI layer → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm i -g @railway/cli
      - name: Deploy
        run: railway up --service ai-layer
        working-directory: ai-layer
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  hud-vercel:
    name: HUD → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy HUD
        run: npx --yes vercel deploy --prod --token "$VERCEL_TOKEN" --yes
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
