spring:
  application:
    name: ultron-os
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ultron}
    username: ${SPRING_DATASOURCE_USERNAME:ultron}
    password: ${SPRING_DATASOURCE_PASSWORD:ultron}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${BACKEND_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# --- Ultron domain configuration (bound to UltronProperties) ---
ultron:
  # Section 14 governance default — human-in-the-loop, NEVER auto-approve by default.
  auto-approve: ${ULTRON_AUTO_APPROVE:false}
  # Optional API key gate for /api/** (browser extension / remote web apps). Blank = open (local).
  api-key: ${ULTRON_API_KEY:}
  # First-run data seeding (starter skills/memories/trading rules). Safe: only seeds empty tables.
  seed:
    enabled: ${ULTRON_SEED_ENABLED:true}
  brain:
    # OllamaBrain is used only if this server is reachable; otherwise HeuristicBrain.
    ollama-base-url: ${ULTRON_BRAIN_OLLAMA_BASE_URL:http://localhost:11434}
    ollama-model: ${ULTRON_BRAIN_OLLAMA_MODEL:llama3.1}
    ollama-embedding-model: ${ULTRON_BRAIN_OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    ollama-enabled: ${ULTRON_BRAIN_OLLAMA_ENABLED:true}
    temperature: ${ULTRON_BRAIN_TEMPERATURE:0.2}
    keep-alive: ${ULTRON_BRAIN_KEEP_ALIVE:5m}
    availability-cache-millis: ${ULTRON_BRAIN_AVAILABILITY_CACHE_MILLIS:5000}
    # Cloud LLM upgrades — opt-in, blank by default (stays free + local unless you set a key).
    openai-api-key: ${OPENAI_API_KEY:}
    openai-model: ${ULTRON_BRAIN_OPENAI_MODEL:gpt-4o-mini}
    gemini-api-key: ${GOOGLE_API_KEY:}
    gemini-model: ${ULTRON_BRAIN_GEMINI_MODEL:gemini-1.5-flash}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    anthropic-model: ${ULTRON_BRAIN_ANTHROPIC_MODEL:claude-3-haiku-20240307}
    groq-api-key: ${GROQ_API_KEY:}
    groq-model: ${ULTRON_BRAIN_GROQ_MODEL:llama-3.1-70b-versatile}
    openrouter-api-key: ${OPENROUTER_API_KEY:}
    openrouter-model: ${ULTRON_BRAIN_OPENROUTER_MODEL:meta-llama/llama-3.1-8b-instruct:free}
    github-models-model: ${ULTRON_BRAIN_GITHUB_MODEL:gpt-4o}
    nvidia-api-key: ${NVIDIA_API_KEY:}
    nvidia-model: ${ULTRON_BRAIN_NVIDIA_MODEL:deepseek-ai/deepseek-r1}
  github:
    # 'fixture' (offline, bundled sample) or 'rest' (opt-in, needs token).
    mode: ${ULTRON_GITHUB_MODE:fixture}
    token: ${GITHUB_TOKEN:}
  cors:
    allowed-origins: ${ULTRON_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  voice:
    default-profile: ${ULTRON_VOICE_PROFILE:default}
    biometric-threshold: ${ULTRON_VOICE_BIOMETRIC_THRESHOLD:0.75}
    biometric-enrolled: ${ULTRON_VOICE_BIOMETRIC_ENROLLED:false}
  # Scheduling cron expressions (override via env or config)
  schedule:
    morning-brief: ${ULTRON_SCHEDULE_MORNING_BRIEF:0 0 7 * * *}
    nightly-agent: ${ULTRON_SCHEDULE_NIGHTLY_AGENT:0 30 23 * * *}
  # Optional Python ai-layer (FastAPI). Disabled by default — the Java backend runs fully
  # offline without it. Enable to delegate heavy DL (embeddings/ingestion/psychology).
  python-bridge:
    enabled: ${ULTRON_PYTHON_BRIDGE_ENABLED:false}
    base-url: ${ULTRON_PYTHON_BRIDGE_URL:http://localhost:8000}
    api-key: ${ULTRON_PYTHON_BRIDGE_KEY:}

logging:
  level:
    com.ultron: INFO
