# Test profile — runs fully offline on in-memory H2. No Docker / Postgres / pgvector needed.
spring:
  datasource:
    url: jdbc:h2:mem:ultron;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: false   # pgvector migration is Postgres-only; schema is created from entities in tests

ultron:
  auto-approve: false
  seed:
    enabled: false
  brain:
    ollama-enabled: false   # force HeuristicBrain in tests (no network)
  github:
    mode: fixture
  cors:
    allowed-origins: http://localhost:5173
  python-bridge:
    enabled: false

logging:
  level:
    com.ultron: INFO
